<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You Got a Hog?</title>

<style>
body {
  font-family: "Comic Sans MS", cursive, sans-serif;
  background-color: #fffacd;
  color: #000;
  text-align: center;
  padding: 50px;
}

h1 {
  font-size: 32px;
  background-color: #99ffcc;
  display: inline-block;
  padding: 10px;
  border: 2px dashed #ff00cc;
}

.headline {
  font-size: 28px;
  font-weight: bold;
  color: #ffffff;
  background: #ff33cc;
  padding: 15px;
  border: 4px double #000;
  margin-bottom: 30px;
  text-shadow: 2px 2px #000000;
}

button, select, input {
  font-size: 16px;
  margin-top: 10px;
  padding: 8px 12px;
  border: 2px solid #003366;
  background-color: #ffccff;
  font-weight: bold;
}

input, select {
  width: 200px;
  display: block;
  margin: 0 auto 10px;
}

label {
  margin-top: 20px;
  display: block;
  font-weight: bold;
}

.hidden {
  display: none;
}

#result, #reverseResult {
  font-size: 48px;
  font-weight: bold;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: #ffff99;
  padding: 30px;
  border: 6px solid #ff33cc;
  box-shadow: 6px 6px 12px #666;
  z-index: 1000;
}

.flashing {
  animation: flash 0.4s infinite;
  color: #ff0033;
  font-size: 72px;
  text-shadow: 3px 3px 0 #ffff00;
}

@keyframes flash {
  0% { opacity: 1; }
  50% { opacity: 0.1; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div class="headline">HOW BIG IS YOUR HOG</div>

<div id="step1">
  <h1>You got a hog?</h1>
  <button onclick="goToHogSize()">Yes</button>
  <button onclick="goToBraSize()">No</button>
</div>

<div id="step2" class="hidden">
  <h1>How big is it?</h1>

  <label for="length">Length (in inches):</label>
  <input type="number" id="length" min="1" />

  <label for="girth">Girth:</label>
  <select id="girth">
    <option value="28">Pencil</option>
    <option value="30">Carrot</option>
    <option value="32">Hot Dog</option>
    <option value="34">Banana</option>
    <option value="36">Corndog</option>
    <option value="38">Gas Station Pickle in a Bag</option>
    <option value="40">Soda Can</option>
  </select>

  <button onclick="calculateSize()">Submit</button>
  <button onclick="goHome()">Back to Start</button>

  <div id="result" class="hidden"></div>
</div>

<div id="step3" class="hidden">
  <h1>What's your bra size?</h1>
  <input type="text" id="braSizeInput" placeholder="e.g. 30D" />
  <button onclick="reverseCalculate()">Submit</button>
  <button onclick="goHome()">Back to Start</button>

  <div id="reverseResult" class="hidden"></div>
</div>

<script>
function goHome() {
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('reverseResult').classList.add('hidden');
}

function goToHogSize() {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function goToBraSize() {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
}

function getSizeLetter(length) {
  switch (parseInt(length)) {
    case 1: return "A";
    case 2: return "B";
    case 3: return "C";
    case 4: return "D";
    case 5: return "DD";
    case 6: return "DDD";
    case 7: return "F";
    case 8: return "G";
    case 9: return "H";
    case 10: return "I";
    default: return "AA";
  }
}

function calculateSize() {
  const length = document.getElementById('length').value;
  const girthValue = document.getElementById('girth').value;
  const resultDiv = document.getElementById('result');

  if (parseInt(length) > 10) {
    resultDiv.innerHTML =
      '<span class="flashing">LIAR</span><br><button onclick="goHome()">Return Home</button>';
  } else {
    const sizeLetter = getSizeLetter(length);
    resultDiv.innerHTML =
      `Your bra size would be ${girthValue}${sizeLetter}.<br><button onclick="goHome()">Return Home</button>`;
  }

  resultDiv.classList.remove('hidden');
}

function reverseCalculate() {
  const input = document.getElementById('braSizeInput').value.trim().toUpperCase();
  const match = input.match(/(\d+)([A-Z]+)/);
  const resultDiv = document.getElementById('reverseResult');

  if (!match) {
    resultDiv.innerHTML =
      'Invalid format. Try something like 30D<br><button onclick="goHome()">Return Home</button>';
    resultDiv.classList.remove('hidden');
    return;
  }

  const girthMap = {
    28: 'Pencil',
    30: 'Carrot',
    32: 'Hot Dog',
    34: 'Banana',
    36: 'Corndog',
    38: 'Gas Station Pickle in a Bag',
    40: 'Soda Can'
  };

  const letterMap = {
    A: 1,
    B: 2,
    C: 3,
    D: 4,
    DD: 5,
    DDD: 6,
    F: 7,
    G: 8,
    H: 9,
    I: 10
  };

  const band = parseInt(match[1]);
  const cup = match[2];
  const length = letterMap[cup] || "Unknown";

  let girth;
  if (girthMap[band]) {
    girth = girthMap[band];
  } else if (band > 40) {
    girth = "Soda Can";
  } else {
    girth = "Mystery Girth";
  }

  resultDiv.innerHTML =
    `Your hog size would be ${length} inches, ${girth}.<br><button onclick="goHome()">Return Home</button>`;

  resultDiv.classList.remove('hidden');
}
</script>

<div style="margin-top:80px; font-size:12px; color:#444;">
  <form action="https://formspree.io/f/xnjgqwny" method="POST">
    <span>
      Subscribe to be alerted every time a movie comes with full frontal comes out
    </span>
    <input 
      type="email" 
      name="email" 
      placeholder="email"
      required
      style="width:140px; font-size:12px; padding:3px;"
    >
    <button 
      type="submit"
      style="font-size:12px; padding:3px 8px; background:#ff33cc; color:white; border:1px solid black;"
    >
      Join Hog Nation
    </button>
  </form>
</div>

</body>
</html>
